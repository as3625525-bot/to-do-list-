# Deploys the static frontend (public/) to GitLab Pages.
# GitLab Pages publishes files from a directory called `public`.

pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Publishing MISSION 33 to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
